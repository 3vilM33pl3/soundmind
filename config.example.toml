[app]
mode = "ManualQa"
auto_start = true
auto_start_cloud = false
http_bind = "127.0.0.1:8765"
simulate_transcriber = false

[capture]
source = "parec"
frame_ms = 20
sample_rate_hz = 16000
channels = 1
silence_threshold = 0.008
chunk_ms = 200
speech_hold_ms = 1200
idle_timeout_ms = 5000

[storage]
database_path = "./soundmind.db"
retention_days = 0

[providers.openai]
enabled = true
model = "gpt-4o-mini"

[providers.elevenlabs]
enabled = true
model = "scribe_v2_realtime"
